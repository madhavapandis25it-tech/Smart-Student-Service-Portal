<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Smart Student Service Portal</title>
    <meta name="description" content="Reset your Smart Student Service Portal account password.">
    <meta name="theme-color" content="#051632">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="assets/logo/psna%20logo.png" type="image/png">
</head>
<body class="auth-page page-load">

    <div class="auth-bg" aria-hidden="true">
        <div class="auth-bg-gold"></div>
        <div class="auth-bg-blend"></div>
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>
        <div class="auth-glow auth-glow-3"></div>
        <div class="auth-bg-reflection"></div>
        <div class="auth-particles" aria-hidden="true">
            <div class="auth-particle" style="left:10%;top:15%;animation-delay:0s;width:3px;height:3px;"></div>
            <div class="auth-particle" style="left:25%;top:35%;animation-delay:1.5s;width:2px;height:2px;"></div>
            <div class="auth-particle" style="left:42%;top:22%;animation-delay:0.8s;width:3px;height:3px;"></div>
            <div class="auth-particle" style="left:62%;top:38%;animation-delay:2.2s;width:2px;height:2px;"></div>
            <div class="auth-particle" style="left:80%;top:12%;animation-delay:0.3s;width:4px;height:4px;"></div>
            <div class="auth-particle" style="left:35%;top:48%;animation-delay:1.8s;width:2px;height:2px;"></div>
            <div class="auth-particle" style="left:55%;top:28%;animation-delay:3s;width:3px;height:3px;"></div>
            <div class="auth-particle" style="left:15%;top:42%;animation-delay:0.5s;width:2px;height:2px;"></div>
            <div class="auth-particle" style="left:88%;top:25%;animation-delay:1.2s;width:3px;height:3px;"></div>
            <div class="auth-particle" style="left:70%;top:52%;animation-delay:2.5s;width:2px;height:2px;"></div>
        </div>
        <div class="auth-blur-circle auth-blur-circle-1"></div>
        <div class="auth-blur-circle auth-blur-circle-2"></div>
        <div class="auth-blur-circle auth-blur-circle-3"></div>
        <svg class="auth-abstract-curve" viewBox="0 0 800 800" aria-hidden="true">
            <path d="M100,400 C200,200 400,100 600,300 C700,400 750,500 700,600 C650,700 500,750 300,700 C150,650 50,550 100,400 Z" fill="none" stroke="rgba(212,174,112,0.06)" stroke-width="1.5"/>
            <path d="M200,500 C300,350 450,300 550,400 C600,450 620,520 580,580 C540,640 450,650 350,620 C280,600 220,560 200,500 Z" fill="none" stroke="rgba(212,174,112,0.04)" stroke-width="1"/>
        </svg>
        <div class="auth-bg-navy-depth"></div>
    </div>

    <!-- Left Side Visual Balance Decoration -->
    <div class="auth-left-decor" aria-hidden="true">
        <div class="auth-decor-glow"></div>
        <div class="auth-decor-gradient"></div>
        <div class="auth-accent-line auth-accent-line-1"></div>
        <div class="auth-accent-line auth-accent-line-2"></div>
        <div class="auth-glass-circle auth-glass-circle-1"></div>
        <div class="auth-glass-circle auth-glass-circle-2"></div>
        <div class="auth-glass-circle auth-glass-circle-3"></div>
        <div class="auth-gold-spot"></div>
    </div>

    <!-- Header -->
    <header class="header auth-header" role="banner">
        <div class="header-inner">
            <div class="header-left">
                <div class="header-logo-wrapper">
                    <img src="assets/logo/psna%20logo.png" alt="PSNA College of Engineering & Technology Logo" class="header-logo" id="collegeLogo">
                    <div class="header-logo-glow" aria-hidden="true"></div>
                </div>
                <div class="header-brand">
                    <h1 class="header-title">Smart Student Service Portal</h1>
                    <p class="header-subtitle">PSNA College of Engineering & Technology, Dindigul</p>
                </div>
            </div>
            <div class="header-right">
                <nav class="header-nav" role="navigation" aria-label="Quick links">
                    <a href="index.html" class="header-nav-link">Home</a>
                    <a href="student-login.html" class="header-nav-link" id="fpNavLogin">Login</a>
                    <a href="help-center.html" class="header-nav-link">Help</a>
                </nav>
            </div>
            <button class="header-mobile-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
    </header>

    <!-- Mobile Navigation Overlay -->
    <div class="mobile-nav" role="dialog" aria-modal="true" aria-label="Mobile navigation">
        <div class="mobile-nav-inner">
            <button class="mobile-nav-close" aria-label="Close navigation menu">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <nav aria-label="Mobile navigation links">
                <a href="index.html" class="mobile-nav-link">Home</a>
                <a href="student-login.html" class="mobile-nav-link" id="fpMobileNavLogin">Login</a>
                <a href="help-center.html" class="mobile-nav-link">Help</a>
            </nav>
        </div>
    </div>

    <!-- Main Forgot Password Container -->
    <main class="main auth-page-container" role="main">
        <div class="auth-card-wrapper">
            <div class="auth-card-glow" aria-hidden="true"></div>
            <div class="auth-card reveal slide-up">
                <div class="auth-card-glass"></div>
                <div class="auth-card-glass-border"></div>
                <div class="auth-card-content">

                    <div class="auth-card-header">
                        <div class="auth-card-logo">
                            <img src="assets/logo/psna%20logo.png" alt="PSNA College Logo">
                        </div>
                        <h2 class="auth-card-title" id="fpBadge">Forgot Password</h2>
                        <p class="auth-card-welcome" id="fpWelcome">Reset Password</p>
                        <p class="auth-card-subtitle" id="fpSubtitle">Enter your registered email to receive a one-time password.</p>
                    </div>

                    <div id="fpStatusLive" class="sr-only" aria-live="assertive"></div>

                    <!-- Step 1: Email + Send OTP -->
                    <div id="fpStep1">
                        <form class="auth-form" id="fpEmailForm" novalidate>
                            <div class="auth-field">
                                <input type="email" id="fpEmail" class="auth-input" placeholder=" " required aria-required="true" autocomplete="email">
                                <label for="fpEmail" class="auth-label">Email Address</label>
                                <div class="error-msg" id="fpEmailError" aria-live="polite"></div>
                            </div>

                            <button type="submit" class="btn btn-primary auth-submit-btn" id="sendOtpBtn">
                                <span class="btn-text">Send OTP</span>
                                <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                                </svg>
                                <div class="spinner" id="sendOtpSpinner" aria-hidden="true" style="display: none;"></div>
                            </button>
                        </form>
                    </div>

                    <!-- Step 2: OTP + New Password -->
                    <div id="fpStep2" style="display: none;">
                        <form class="auth-form" id="fpResetForm" novalidate>

                            <!-- OTP Inputs -->
                            <div class="auth-field">
                                <label class="otp-label">Enter OTP</label>
                                <div class="otp-container" id="otpContainer">
                                    <input type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp1" required aria-label="OTP digit 1" autocomplete="off">
                                    <input type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp2" required aria-label="OTP digit 2" autocomplete="off">
                                    <input type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp3" required aria-label="OTP digit 3" autocomplete="off">
                                    <input type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp4" required aria-label="OTP digit 4" autocomplete="off">
                                    <input type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp5" required aria-label="OTP digit 5" autocomplete="off">
                                    <input type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp6" required aria-label="OTP digit 6" autocomplete="off">
                                </div>
                                <div class="error-msg" id="otpError" aria-live="polite"></div>
                            </div>

                            <!-- New Password -->
                            <div class="auth-field">
                                <input type="password" id="fpNewPassword" class="auth-input" placeholder=" " minlength="6" required aria-required="true" autocomplete="new-password">
                                <label for="fpNewPassword" class="auth-label">New Password</label>
                                <button type="button" class="auth-eye-toggle" aria-label="Show password" tabindex="0">
                                    <svg class="eye-icon eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                        <line x1="1" y1="1" x2="23" y2="23"></line>
                                    </svg>
                                    <svg class="eye-icon eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                                <div class="error-msg" id="fpNewPasswordError" aria-live="polite"></div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="auth-field">
                                <input type="password" id="fpConfirmPassword" class="auth-input" placeholder=" " required aria-required="true" autocomplete="new-password">
                                <label for="fpConfirmPassword" class="auth-label">Confirm Password</label>
                                <button type="button" class="auth-eye-toggle" aria-label="Show password" tabindex="0">
                                    <svg class="eye-icon eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                        <line x1="1" y1="1" x2="23" y2="23"></line>
                                    </svg>
                                    <svg class="eye-icon eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                                <div class="error-msg" id="fpConfirmPasswordError" aria-live="polite"></div>
                            </div>

                            <button type="submit" class="btn btn-primary auth-submit-btn" id="resetPwdBtn">
                                <span class="btn-text">Reset Password</span>
                                <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                                </svg>
                                <div class="spinner" id="resetPwdSpinner" aria-hidden="true" style="display: none;"></div>
                            </button>
                        </form>
                    </div>

                    <div class="auth-card-footer">
                        <div class="auth-back-home">
                            <a href="student-login.html" class="back-home-link" id="fpBackLink">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                                </svg>
                                Back to Login
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div class="ripple-container" aria-hidden="true"></div>

    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var role = params.get('role') === 'staff' ? 'staff' : 'student';
        var isStaff = role === 'staff';
        var loginPage = isStaff ? 'staff-role-selection.html' : 'student-login.html';
        var label = isStaff ? 'Staff' : 'Student';

        document.title = label + ' Password Recovery | Smart Student Service Portal';
        var badge = document.getElementById('fpBadge');
        if (badge) badge.textContent = label + ' Password Recovery';
        var welcome = document.getElementById('fpWelcome');
        if (welcome) welcome.textContent = 'Reset ' + label + ' Password';
        var subtitle = document.getElementById('fpSubtitle');
        if (subtitle) subtitle.textContent = isStaff ?
            'Enter your registered staff email to receive a one-time password.' :
            'Enter your registered student email to receive a one-time password.';

        document.getElementById('fpNavLogin').href = loginPage;
        document.getElementById('fpMobileNavLogin').href = loginPage;
        document.getElementById('fpBackLink').href = loginPage;

        sessionStorage.setItem('fpRole', role);
    })();
    </script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
    <script src="js/forgot-password.js"></script>
</body>
</html>
